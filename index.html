<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Asuncion</title>
    <meta name = "description" content="App para encontrar proveedores de servicios en Asuncion"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href=https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" >
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161a23; --card: #1c2130; --accent: #f5a623; --accent2: #e8503a;
      --text: #f0eee8; --muted: #7a8099; --border: #2a2f3e; --radius: 16px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 48px; background: rgba(13,15,20,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
    .logo span { color: var(--text); }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-weight: 500; transition: color .2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-cta { background: var(--accent); color: #0d0f14; font-weight: 700; padding: 10px 24px; border-radius: 100px; text-decoration: none; font-size: .9rem; transition: transform .2s, box-shadow .2s; }
    .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,166,35,.35); }
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 24px 80px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,166,35,.12) 0%, transparent 70%); pointer-events: none; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(245,166,35,.12); border: 1px solid rgba(245,166,35,.3); color: var(--accent); padding: 6px 16px; border-radius: 100px; font-size: .8rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 28px; animation: fadeUp .6s ease both; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 800; line-height: 1.05; letter-spacing: -2px; max-width: 820px; animation: fadeUp .7s .1s ease both; }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero p { max-width: 540px; margin: 24px auto 0; color: var(--muted); font-size: 1.1rem; line-height: 1.7; animation: fadeUp .7s .2s ease both; }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 40px; animation: fadeUp .7s .3s ease both; }
    .btn-primary { background: var(--accent); color: #0d0f14; font-weight: 700; padding: 16px 36px; border-radius: 100px; text-decoration: none; font-size: 1rem; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 20px rgba(245,166,35,.3); }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(245,166,35,.4); }
    .btn-secondary { background: transparent; color: var(--text); font-weight: 600; padding: 16px 36px; border-radius: 100px; text-decoration: none; font-size: 1rem; border: 1px solid var(--border); transition: border-color .2s, background .2s; }
    .btn-secondary:hover { border-color: var(--accent); background: rgba(245,166,35,.05); }
    .hero-stats { display: flex; gap: 48px; margin-top: 72px; flex-wrap: wrap; justify-content: center; animation: fadeUp .7s .4s ease both; }
    .stat { text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--accent); }
    .stat-label { color: var(--muted); font-size: .85rem; margin-top: 4px; }
    .section { padding: 96px 48px; max-width: 1200px; margin: 0 auto; }
    .section-header { margin-bottom: 48px; }
    .section-tag { display: inline-block; background: rgba(232,80,58,.12); color: var(--accent2); border: 1px solid rgba(232,80,58,.25); padding: 4px 12px; border-radius: 100px; font-size: .75rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px; }
    .section h2 { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
    .section h2 span { color: var(--accent); }
    .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .cat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 20px; text-align: center; text-decoration: none; color: var(--text); transition: transform .25s, border-color .25s, box-shadow .25s; cursor: pointer; display: block; }
    .cat-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 16px 40px rgba(0,0,0,.4); }
    .cat-icon { font-size: 2.2rem; margin-bottom: 12px; }
    .cat-name { font-weight: 600; font-size: .95rem; }
    .cat-count { color: var(--muted); font-size: .8rem; margin-top: 4px; }
    .providers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .provider-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: transform .25s, box-shadow .25s; }
    .provider-card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(0,0,0,.5); }
    .provider-img { height: 180px; background: linear-gradient(135deg, var(--surface), var(--border)); display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; overflow: hidden; }
    .provider-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(28,33,48,.8)); }
    .provider-badge-top { position: absolute; top: 12px; right: 12px; z-index: 1; background: var(--accent); color: #0d0f14; font-size: .7rem; font-weight: 700; padding: 4px 10px; border-radius: 100px; letter-spacing: .05em; }
    .provider-body { padding: 20px; }
    .provider-meta { display: flex; justify-content: space-between; align-items: flex-start; }
    .provider-name { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 700; }
    .provider-cat { color: var(--accent); font-size: .8rem; font-weight: 600; margin-top: 2px; }
    .stars { display: flex; align-items: center; gap: 4px; }
    .stars span { color: var(--accent); font-size: .85rem; font-weight: 700; }
    .stars small { color: var(--muted); font-size: .75rem; }
    .provider-info { margin-top: 12px; color: var(--muted); font-size: .88rem; line-height: 1.6; }
    .provider-footer { display: flex; gap: 10px; margin-top: 18px; }
    .btn-sm { flex: 1; padding: 10px; border-radius: 10px; font-weight: 600; font-size: .85rem; text-decoration: none; text-align: center; transition: all .2s; cursor: pointer; border: none; }
    .btn-call { background: rgba(245,166,35,.15); color: var(--accent); border: 1px solid rgba(245,166,35,.3); }
    .btn-call:hover { background: var(--accent); color: #0d0f14; }
    .btn-view { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-view:hover { border-color: var(--accent); color: var(--accent); }
    .how-section { background: var(--surface); padding: 96px 0; }
    .how-inner { max-width: 1200px; margin: 0 auto; padding: 0 48px; }
    .steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 32px; margin-top: 56px; }
    .step-num { font-family: 'Syne', sans-serif; font-size: 4rem; font-weight: 800; color: rgba(245,166,35,.15); line-height: 1; margin-bottom: 16px; }
    .step h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
    .step p { color: var(--muted); font-size: .9rem; line-height: 1.7; }
    .step-icon { font-size: 1.6rem; margin-bottom: 8px; }
    .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .testi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
    .testi-stars { color: var(--accent); font-size: 1rem; margin-bottom: 16px; }
    .testi-text { font-size: .95rem; line-height: 1.75; color: var(--text); font-style: italic; margin-bottom: 20px; }
    .testi-author { display: flex; align-items: center; gap: 12px; }
    .testi-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .9rem; color: #0d0f14; }
    .testi-name { font-weight: 600; font-size: .9rem; }
    .testi-role { color: var(--muted); font-size: .8rem; }
    .cta-section { padding: 96px 48px; text-align: center; background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(245,166,35,.08) 0%, transparent 70%); }
    .cta-section h2 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -1.5px; max-width: 700px; margin: 0 auto 24px; }
    .cta-section p { color: var(--muted); max-width: 460px; margin: 0 auto 40px; line-height: 1.7; }
    footer { border-top: 1px solid var(--border); padding: 40px 48px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    footer p { color: var(--muted); font-size: .85rem; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--muted); font-size: .85rem; text-decoration: none; transition: color .2s; }
    .footer-links a:hover { color: var(--accent); }
    .search-bar { display: flex; max-width: 560px; margin: 48px auto 0; background: var(--card); border: 1px solid var(--border); border-radius: 100px; overflow: hidden; transition: border-color .2s; animation: fadeUp .7s .35s ease both; }
    .search-bar:focus-within { border-color: var(--accent); }
    .search-bar input { flex: 1; background: none; border: none; outline: none; padding: 16px 24px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .95rem; }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar button { background: var(--accent); color: #0d0f14; border: none; padding: 12px 28px; margin: 6px; border-radius: 100px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .9rem; transition: opacity .2s; }
    .search-bar button:hover { opacity: .85; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; color: var(--text); font-size: 1.5rem; }
    .mobile-menu { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 99; flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text); text-decoration: none; }
    .mobile-menu a:hover { color: var(--accent); }
    .close-menu { position: absolute; top: 24px; right: 24px; background: none; border: none; font-size: 1.8rem; color: var(--text); cursor: pointer; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .nav-links, .nav-cta { display: none; }
      .hamburger { display: block; }
      .section { padding: 64px 24px; }
      .hero { padding: 100px 24px 64px; }
      .how-inner { padding: 0 24px; }
      footer { padding: 32px 24px; flex-direction: column; text-align: center; }
      .cta-section { padding: 64px 24px; }
      .hero-stats { gap: 32px; }
    }

    </style>
</head>

</body>
</html>
